name: CD

on:
  push:
    branches: [ main ]

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend
        run: |
          docker build -t $DOCKER_USER/laravel-backend:latest ./backend
          docker push $DOCKER_USER/laravel-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t $DOCKER_USER/angular-frontend:latest ./frontend
          docker push $DOCKER_USER/angular-frontend:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/staging
            docker-compose pull
            docker-compose up -d

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
 
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/production
            docker-compose pull
            docker-compose up -d